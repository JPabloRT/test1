<div class="login-card">
  <p class="login-label">Iniciar sesión</p>
  <h2>Bienvenido de nuevo</h2>
  <p class="login-copy">
    Ingresa tus credenciales para acceder al portal de clientes.
  </p>

  <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
    <label for="client-email">Correo electrónico</label>
    <input
      id="client-email"
      type="email"
      placeholder="correo@empresa.com"
      formControlName="email"
    />

    <label for="client-password">Contraseña</label>
    <input
      id="client-password"
      type="password"
      placeholder="Ingresa tu contraseña"
      formControlName="password"
    />

    <div class="login-row">
      <label class="check-row" for="remember-session">
        <input id="remember-session" type="checkbox" formControlName="remember" />
        <span>Recordar sesión</span>
      </label>
    </div>

    @if (errorMessage()) {
      <p class="form-message form-error">{{ errorMessage() }}</p>
    }

    @if (successMessage()) {
      <p class="form-message form-success">{{ successMessage() }}</p>
    }

    <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading()">
      {{ loading() ? 'Entrando...' : 'Entrar al portal' }}
    </button>
  </form>

  <div class="login-support">
    <p>¿No tienes acceso?</p>
    <span class="login-link">Solicita apoyo a tu ejecutivo</span>
  </div>
</div>
